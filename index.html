<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Uploader</title>

    <!-- Style -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="card-container">
      <div class="card-header">
        <div class="card-title">Upload your image</div>
        <div class="card-tip">File should be Jpeg, Png...</div>
      </div>

      <div class="card-upload-section">
        <div class="card-placeholder-img">
          <img id="image-item" src="./image.svg" />
        </div>
        <div class="card-placeholder-tip">Drag & Drop image Here</div>
      </div>

      <div class="card-footer">
        <div class="card-tip">Or</div>
        <div class="footer-button">Choose a file</div>
      </div>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
